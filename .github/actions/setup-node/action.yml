name: Setup Node
description: Checkout is separate — this step installs deps with npm cache

inputs:
  node-version:
    default: "22"
  package-manager:
    default: npm

runs:
  using: composite
  steps:
    - if: inputs.package-manager == 'pnpm'
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.package-manager }}

    - if: inputs.package-manager == 'pnpm'
      shell: bash
      run: pnpm install --frozen-lockfile

    - if: inputs.package-manager == 'npm'
      shell: bash
      run: npm ci
